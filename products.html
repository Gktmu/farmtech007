<!DOCTYPE html>
<html>
<head>
    <title>Products</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;

            background: 
            linear-gradient(rgba(20,90,50,0.8), rgba(20,90,50,0.9)),
            url('https://images.unsplash.com/photo-1500595046743-ddf4d3d753fd');

            background-size: cover;
            background-position: center;
            color: white;
        }

        /* NAVBAR */
        nav {
            background: rgba(20, 90, 50, 0.95);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
        }

        nav b {
            font-size: 22px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        /* CONTAINER */
        .container {
            max-width: 1100px;
            margin: auto;
            padding: 30px;
        }

        .section-title {
            margin-bottom: 20px;
        }

        /* PRODUCT LIST */
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* ROW */
        .product-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.12);
            padding: 15px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .product-row:hover {
            transform: scale(1.02);
        }

        /* IMAGE */
        .row-img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
        }

        /* INFO */
        .row-info {
            flex: 1;
            margin-left: 20px;
        }

        .row-info h3 {
            margin: 0;
        }

        .price {
            color: #a9f5c3;
            font-weight: bold;
        }

        /* BUTTONS */
        .row-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: white;
            color: #145a32;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
        }

        .btn-outline {
            border: 2px solid white;
            padding: 5px 10px;
            border-radius: 6px;
            color: white;
            text-decoration: none;
        }

        .btn-danger {
            background: #e74c3c;
            padding: 6px 12px;
            border-radius: 6px;
            color: white;
            text-decoration: none;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <b>🌾 Agro Market</b>
    <div>
        <a href="/">Home</a>
        <a href="/products">Products</a>
        <a href="/sell">Sell</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<!-- PRODUCTS -->
<div class="container">
    <h2 class="section-title">🌾 Available Products</h2>

    <div class="product-list">

        {% for p in products %}
        <div class="product-row">

            <img src="{{ url_for('static', filename='uploads/' + p.image) }}" class="row-img">

            <div class="row-info">
                <h3>{{ p.name }}</h3>
                <p class="price">₹{{ p.price }}</p>
                <span>Stock: {{ p.quantity }}</span>
            </div>

            <div class="row-actions">

                <a href="/buy/{{ p.id }}" class="btn">Buy</a>

                {% if session['role'] == 'farmer' %}
                <a href="/update_product/{{ p.id }}" class="btn-outline">Edit</a>
                {% endif %}

                {% if session['role'] == 'admin' %}
                <a href="/delete_product/{{ p.id }}" class="btn-danger">Delete</a>
                {% endif %}

            </div>

        </div>
        {% endfor %}

    </div>
</div>

</body>
</html>
